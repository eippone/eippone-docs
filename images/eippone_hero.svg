<svg width="100%" height="260" viewBox="0 0 1200 260" fill="none" xmlns="http://www.w3.org/2000/svg">

  <!-- ===================== -->
  <!-- BACKGROUND GRADIENT -->
  <!-- ===================== -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="260">
      <stop offset="0%" stop-color="#0f172a">
        <animate attributeName="stop-color" values="#0f172a;#1e293b;#0b1220;#0f172a" dur="10s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" stop-color="#1e293b">
        <animate attributeName="stop-color" values="#1e293b;#0b1220;#1e293b;#0f172a" dur="10s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>

    <!-- Glow -->
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#38bdf8" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#0ea5e9" stop-opacity="0"/>
    </radialGradient>

    <!-- Particle Blur -->
    <filter id="blur">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
  </defs>

  <!-- ===================== -->
  <!-- BACKGROUND -->
  <!-- ===================== -->
  <rect width="1200" height="260" fill="url(#bg)"/>

  <!-- ===================== -->
  <!-- MOVING GRID LINES -->
  <!-- ===================== -->
  <g opacity="0.15">
    <path d="M0 60 H1200" stroke="#38bdf8">
      <animate attributeName="transform" type="translate" from="0 0" to="0 20" dur="4s" repeatCount="indefinite"/>
    </path>
    <path d="M0 120 H1200" stroke="#38bdf8">
      <animate attributeName="transform" type="translate" from="0 0" to="0 -20" dur="6s" repeatCount="indefinite"/>
    </path>
    <path d="M0 180 H1200" stroke="#38bdf8">
      <animate attributeName="transform" type="translate" from="0 0" to="0 15" dur="5s" repeatCount="indefinite"/>
    </path>
  </g>

  <!-- ===================== -->
  <!-- FLOATING GLOWS -->
  <!-- ===================== -->
  <circle cx="200" cy="120" r="80" fill="url(#glow)" filter="url(#blur)">
    <animate attributeName="cy" values="120;90;120" dur="6s" repeatCount="indefinite"/>
  </circle>

  <circle cx="900" cy="140" r="100" fill="url(#glow)" filter="url(#blur)">
    <animate attributeName="cy" values="140;170;140" dur="7s" repeatCount="indefinite"/>
  </circle>

  <!-- ===================== -->
  <!-- DATA FLOW LINES -->
  <!-- ===================== -->
  <path d="M0 200 C300 100, 600 300, 1200 120" stroke="#38bdf8" stroke-width="2" opacity="0.4" fill="none">
    <animate attributeName="stroke-dasharray" values="0,1000;1000,0" dur="6s" repeatCount="indefinite"/>
  </path>

  <path d="M0 80 C400 200, 800 0, 1200 160" stroke="#22c55e" stroke-width="2" opacity="0.3" fill="none">
    <animate attributeName="stroke-dasharray" values="1000,0;0,1000" dur="8s" repeatCount="indefinite"/>
  </path>

  <!-- ===================== -->
  <!-- TITLE TEXT -->
  <!-- ===================== -->
  <text x="50%" y="110" text-anchor="middle" fill="#ffffff" font-size="44" font-family="Arial, sans-serif" font-weight="bold">
    EIPPONE ECOSYSTEM
  </text>

  <text x="50%" y="155" text-anchor="middle" fill="#38bdf8" font-size="18" font-family="Arial, sans-serif">
    AI • Finance • Cybersecurity • Environmental Intelligence
  </text>

  <!-- ===================== -->
  <!-- TAGLINE -->
  <!-- ===================== -->
  <text x="50%" y="190" text-anchor="middle" fill="#94a3b8" font-size="14">
    Simulate • Predict • Protect • Optimize
  </text>

</svg>
